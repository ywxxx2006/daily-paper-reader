      enabled: true
      paper_sources:
        - arxiv
        - biorxiv
      keywords:
        - keyword: dance biomechanics
          keyword_cn: 舞蹈生物力学
          query: biomechanical analysis of dance movements
        - keyword: dance physiology
          keyword_cn: 舞蹈生理学
          query: physiological responses and adaptations in dancers
